<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعرف اللاعب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Start Screen -->
        <div class="start-screen" id="start-screen">
            <div class="main-logo">
                <img src="https://i.imgur.com/w2i9y9k.png" alt="Game Logo">
            </div>
            <button class="action-btn play-btn" id="play-btn">▶ Play</button>
            <div class="main-menu-buttons">
                <button class="icon-btn" id="leaderboard-btn" title="لوحة المتصدرين">📊</button>
                <button class="icon-btn" id="settings-btn" title="الإعدادات">⚙️</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div class="game-container hidden" id="game-container">
            <div class="game-header">
                <div id="game-mode-display" class="game-mode-display"></div>
                <div id="main-timer-display" class="main-timer-display"></div>
            </div>
            
            <!-- New Top Bar -->
            <div class="top-bar">
                <div class="resource-display">
                    <span id="cash-display">💲 0</span>
                </div>
                <div class="resource-display">
                    <span id="score-display">🏆 0</span>
                </div>
            </div>

            <div class="player-level" id="player-level"></div>
            <div class="progress-bar-container"><div class="progress-bar" id="progress-bar"></div></div>
            
            <div class="timer-container"><div class="timer-bar" id="timer-bar"></div></div>

            <div class="powerups-container">
                <button class="powerup-btn" id="powerup-5050" data-cost="15" title="حذف إجابة (15 من النقود)">50/50</button>
                <button class="powerup-btn" id="powerup-nation" data-cost="20" title="كشف الجنسية (20 من النقود)">🌍</button>
                <button class="powerup-btn" id="powerup-club" data-cost="25" title="كشف النادي (25 من النقود)">👕</button>
                <button class="powerup-btn" id="powerup-hint" data-cost="30" title="تلميح الحرف (30 من النقود)">A..?</button>
            </div>

            <div class="info-box" id="info-box"></div>
            <button id="next-info-btn">معلومة إضافية</button>
            <div class="choices" id="choices"></div>
        </div>

        <!-- End Screen -->
        <div class="end-screen hidden" id="end-screen">
            <h1>انتهت اللعبة!</h1>
            <div class="final-score-container">
                <p id="final-score-label">نتيجتك النهائية:</p>
                <div class="final-score" id="final-score">0</div>
                
                <div class="stats-container">
                    <p class="stats">أطول سلسلة صحيحة: <span id="best-streak-display">0</span></p>
                    <p class="stats">المساعدات المستخدمة: <span id="powerups-used-display">0</span></p>
                </div>

                <p>أعلى نتيجة (الوضع العادي): <span id="high-score-end-display">0</span></p>
                <p>أعلى نتيجة (وضع التحدي): <span id="challenge-high-score-end-display">0</span></p>
            </div>
            <button class="action-btn" id="restart-btn">العب مرة أخرى</button>
            <button class="action-btn" id="share-btn">🏆 مشاركة النتيجة</button>
            <button class="action-btn secondary" id="back-to-menu-btn">القائمة الرئيسية</button>
        </div>
    </div>

    <div class="result-overlay" id="result-overlay"><div class="result-text" id="result-text"></div></div>

    <script src="script.js"></script>
</body>
</html>
