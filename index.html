<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعرف اللاعب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- ===== شاشة البداية (بسيطة) ===== -->
        <div id="start-screen" class="screen active">
            <!-- الشريط العلوي -->
            <div class="top-bar">
                <button class="icon-btn" id="settings-btn">⚙️</button>
                <div class="stats">
                    <div class="stat">🏆 <span id="highscore-display">0</span></div>
                    <div class="stat">💰 <span id="cash-display">100</span></div>
                </div>
                <button class="icon-btn" id="leaderboard-btn">📊</button>
            </div>

            <!-- الشعار -->
            <div class="logo-area">
                <img src="https://i.postimg.cc/bJs4zzxS/1000060703.png" alt="شعار" class="logo">
            </div>

            <!-- مستوى اللاعب -->
            <div class="level-area">
                <div class="level-badge" id="level-badge">مبتدئ</div>
                <div class="xp-bar">
                    <div class="xp-fill" id="xp-bar-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- زر ابدأ فقط -->
            <button class="play-btn" id="play-btn">▶ ابدأ اللعب</button>
        </div>

        <!-- ===== شاشة اللعب (فيها كل الخيارات) ===== -->
        <div id="game-screen" class="screen hidden">
            <!-- الهيدر -->
            <div class="game-header">
                <button class="back-btn" id="back-btn">↩ رجوع</button>
                <div class="game-stats">
                    <span>🏆 <span id="score-display">0</span></span>
                    <span>💰 <span id="cash-display-game">100</span></span>
                    <span>⚡ <span id="points-display">30</span></span>
                </div>
            </div>

            <!-- اختيارات اللعبة (تظهر كلها هنا) -->
            <div class="options-panel">
                <!-- نمط اللعب -->
                <div class="option-group">
                    <h3>🎮 نمط اللعب</h3>
                    <div class="option-buttons">
                        <button class="option-btn active" id="normal-mode">عادي</button>
                        <button class="option-btn" id="challenge-mode">تحدي</button>
                        <button class="option-btn" id="boss-mode">معركة النجوم</button>
                        <button class="option-btn" id="blind-mode">وضع أعمى</button>
                    </div>
                </div>

                <!-- مستوى الصعوبة -->
                <div class="option-group">
                    <h3>⚡ مستوى الصعوبة</h3>
                    <div class="option-buttons">
                        <button class="option-btn small active" data-diff="easy">سهل</button>
                        <button class="option-btn small" data-diff="medium">متوسط</button>
                        <button class="option-btn small" data-diff="hard">صعب</button>
                        <button class="option-btn small" data-diff="expert">خبير</button>
                        <button class="option-btn small" data-diff="legend">أسطورة</button>
                    </div>
                </div>

                <!-- هدية اليوم -->
                <div class="option-group">
                    <button class="gift-btn" id="gift-btn">🎁 هدية اليوم</button>
                </div>
            </div>

            <!-- مؤقت -->
            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>
            <div id="challenge-timer" class="challenge-timer hidden">⏰ <span>60</span> ث</div>

            <!-- معلومات اللاعب -->
            <div class="info-box" id="info-box"></div>

            <!-- زر المعلومة التالية -->
            <button class="next-btn" id="next-info-btn">▶ المعلومة التالية</button>

            <!-- أزرار الاختيار (تظهر هنا) -->
            <div class="choices-area" id="choices-area"></div>

            <!-- Power-ups -->
            <div class="powerups-area">
                <button class="powerup" id="powerup-5050">50/50 <span>15</span></button>
                <button class="powerup" id="powerup-nation">🌍 <span>20</span></button>
                <button class="powerup" id="powerup-club">👕 <span>25</span></button>
                <button class="powerup" id="powerup-hint">🔤 <span>30</span></button>
                <button class="powerup" id="powerup-swap">🔄 <span>35</span></button>
            </div>

            <!-- ترتيب الأندية -->
            <div id="club-standings" class="club-standings hidden"></div>
        </div>

        <!-- ===== شاشة النهاية ===== -->
        <div id="end-screen" class="screen hidden">
            <h2>انتهت اللعبة</h2>
            <div class="final-stats">
                <p>🏆 النتيجة: <span id="final-score">0</span></p>
                <p>💰 الكاش: <span id="final-cash">0</span></p>
                <p>🔥 السلسلة: <span id="final-streak">0</span></p>
                <p>⭐ الخبرة: <span id="final-xp">0</span></p>
            </div>
            <div class="end-buttons">
                <button class="action-btn" id="restart-btn">🔄 العب مجدداً</button>
                <button class="action-btn secondary" id="menu-btn">🏠 القائمة</button>
            </div>
        </div>

        <!-- ===== Overlay النتائج ===== -->
        <div id="result-overlay" class="overlay hidden">
            <h2 id="result-text"></h2>
        </div>

        <!-- ===== مودال الإعدادات ===== -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h3>الإعدادات <button class="close-btn" id="close-settings">✕</button></h3>
                <div class="setting">
                    <span>🔊 الصوت</span>
                    <label class="switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting">
                    <span>📳 الاهتزاز</span>
                    <label class="switch">
                        <input type="checkbox" id="vibration-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="reset-btn" id="reset-data">🔄 إعادة تعيين</button>
            </div>
        </div>

        <!-- ===== مودال المتصدرين ===== -->
        <div id="leaderboard-modal" class="modal hidden">
            <div class="modal-content">
                <h3>لوحة المتصدرين <button class="close-btn" id="close-leaderboard">✕</button></h3>
                <ul id="leaderboard-list" class="leaderboard-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
