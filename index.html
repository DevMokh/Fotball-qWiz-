<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شغل مخك - الإصدار الألترا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.6.0/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-ultra-full';

        window.db = db;
        window.gameData = {
            coins: 500, 
            xp: 0, 
            level: 1, 
            username: "العبقري المجهول",
            inventory: { delete: 5, skip: 5, hint: 5 },
            stats: { gamesPlayed: 0, completedSections: 0 },
            rank: "باحث عن المعرفة",
            theme: 'dark',
            notifications: [{text: "مرحباً بك في عالم المعرفة!", time: "الآن"}]
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                const userDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                onSnapshot(userDoc, (snap) => {
                    if (snap.exists()) {
                        window.gameData = { ...window.gameData, ...snap.data() };
                    } else {
                        setDoc(userDoc, window.gameData);
                    }
                    if (typeof window.updateUI === 'function') window.updateUI();
                });
            }
        });

        window.saveData = async () => {
            if (!window.currentUser) return;
            const uid = window.currentUser.uid;
            await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), window.gameData, { merge: true });
            // Update public ranking
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', uid), {
                username: window.gameData.username,
                xp: window.gameData.xp,
                level: window.gameData.level
            }, { merge: true });
        };
    </script>

    <style>
        :root { --bg: #0d0d0d; --card: #181818; --accent: #fbbf24; --text: #ffffff; }
        .light-mode { --bg: #f3f4f6; --card: #ffffff; --accent: #d97706; --text: #1f2937; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        
        .screen { display: none; height: calc(100vh - 85px - 75px); padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #111; z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 40px 0 0 40px; box-shadow: -20px 0 50px rgba(0,0,0,0.5); overflow-y: auto; }
        .sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; backdrop-filter: blur(8px); }

        .side-item { background: #1a1a1a; margin: 10px 20px; padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        
        .btn-option { background: var(--card); padding: 20px; border-radius: 24px; text-align: right; border: 1px solid rgba(255,255,255,0.05); width: 100%; margin-bottom: 12px; font-weight: 700; transition: 0.2s; color: var(--text); }
        .btn-option.correct { background: #059669 !important; border-color: #10b981 !important; color: white !important; }
        .btn-option.wrong { background: #dc2626 !important; border-color: #ef4444 !important; color: white !important; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: var(--bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-link { opacity: 0.3; transition: 0.3s; font-size: 24px; cursor: pointer; }
        .nav-link.active { opacity: 1; color: var(--accent); transform: scale(1.2); }

        .analysis-box { max-height: 0; overflow: hidden; transition: 0.5s ease-in-out; opacity: 0; }
        .analysis-box.show { max-height: 500px; opacity: 1; margin-top: 15px; }
        
        .xp-bar { height: 12px; background: #222; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body id="main-body">

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<div class="max-w-[500px] mx-auto h-screen relative flex flex-col shadow-2xl overflow-hidden">

                    <button onclick="window.useHelper('hint')" class="bg-[var(--card)] py-5 rounded-[28px] border border-white/5 flex flex-col items-center">

        <!-- Settings -->

                <button onclick="window.changeUsername()" class="w-full py-4 bg-amber-500 text-black rounded-2xl font-black mb-10 shadow-lg">حفظ التغييرات</button>

    <!-- Nav Bar -->

        <div class="px-8 mt-4">
            <h4 class="text-xs font-black text-slate-500 mb-4 uppercase tracking-widest">آخر التنبيهات 🔔</h4>

        <div class="mt-10 border-t border-white/5 pt-6 px-4">

        </div>

<script>
    const categoryConfig = {
        islamic: { name: "إسلاميات", icon: "🕌", subs: ["قصص الأنبياء", "القرآن الكريم", "الصحابة"] },
        egypt: { name: "تاريخ مصر", icon: "🏺", subs: ["الفراعنة", "مصر الإسلامية", "مصر الحديثة"] },
        tech: { name: "تقنية", icon: "💻", subs: ["برمجة", "ذكاء اصطناعي", "تاريخ الحاسوب"] },
        science: { name: "علوم وفضاء", icon: "🚀", subs: ["الفضاء", "جسم الإنسان", "فيزياء"] },
        geo: { name: "جغرافيا", icon: "🌍", subs: ["عواصم", "بحار", "أعلام"] },
        sports: { name: "رياضة", icon: "⚽", subs: ["كرة قدم", "أولمبياد", "أساطير"] },
        puzzles: { name: "ألغاز", icon: "🧩", subs: ["منطق", "أحجيات", "خداع بصري"] },
        food: { name: "ثقافة الطعام", icon: "🍱", subs: ["أطباق عالمية", "حلويات", "توابل"] }
    };

    let questions = [], qIdx = 0;

    window.toggleSidebar = () => {
        const s = document.getElementById('sidebar');
        const o = document.getElementById('sidebar-overlay');
        const isOpen = s.classList.toggle('open');
        o.style.display = isOpen ? 'block' : 'none';
    };

    window.navTo = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(`screen-${id}`).classList.add('active');
        const nav = document.getElementById(`n-${id}`);
        if(nav) nav.classList.add('active');
        document.getElementById('main-nav').style.display = id === 'quiz' ? 'none' : 'flex';
        
        if(id === 'paths') renderPaths();
        if(id === 'shop') renderShop();
        if(id === 'leaderboard') renderLeaderboard();
        
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').style.display = 'none';
    };

    function renderPaths() {
        const list = document.getElementById('paths-list');
        list.innerHTML = '';
        for(let key in categoryConfig) {
            const cat = categoryConfig[key];
            list.innerHTML += `
                <div onclick="window.showSubs('${key}')" class="bg-[var(--card)] p-6 rounded-[35px] flex justify-between items-center border border-white/5 active:scale-95 transition cursor-pointer hover:border-amber-500/50">
                    <div class="flex items-center gap-6">
                        <div class="text-4xl w-16 h-16 flex items-center justify-center bg-black/40 rounded-3xl">${cat.icon}</div>
                        <div>
                            <h4 class="font-black text-xl mb-1">${cat.name}</h4>
                            <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">استكشف الأقسام</p>
                        </div>
                    </div>
                    <span class="text-amber-500 font-black text-2xl opacity-30">➜</span>
                </div>`;
        }
    }

    window.showSubs = (key) => {
        const list = document.getElementById('paths-list');
        list.innerHTML = `<button onclick="renderPaths()" class="text-amber-500 font-black mb-6 flex items-center gap-3">🔙 العودة للمجالات</button>`;
        categoryConfig[key].subs.forEach(sub => {
            list.innerHTML += `
                <div onclick="window.startQuiz('${categoryConfig[key].name}', '${sub}')" class="bg-[var(--card)] p-5 rounded-[28px] border border-white/5 mb-4 flex justify-between items-center cursor-pointer active:bg-amber-500/10 transition">
                    <span class="font-bold text-slate-200 text-lg">${sub}</span>
                    <span class="bg-amber-500 text-black px-5 py-2 rounded-2xl font-black text-xs uppercase shadow-lg">ابدأ</span>
                </div>`;
        });
    };

    window.startQuiz = async (cat, sub) => {
        window.navTo('quiz');
        document.getElementById('q-text').innerText = "جاري استدعاء الأسئلة...";
        document.getElementById('options-box').innerHTML = '';
        document.getElementById('analysis-container').classList.remove('show');
        document.getElementById('quiz-helpers').style.display = 'grid';

        // Fetch real questions or use defaults
        const qSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
        questions = [];
        qSnap.forEach(d => { if(d.data().category === cat) questions.push(d.data()); });

        if(questions.length === 0) {
            questions = [
                {t: "من هو أول من آمن من الرجال؟", a: ["أبو بكر الصديق", "علي بن أبي طالب", "عمر بن الخطاب", "عثمان بن عفان"], c: 0, x: "أبو بكر الصديق رضي الله عنه كان أقرب الناس للنبي صلى الله عليه وسلم وأول من صدقه."},
                {t: "ما هو أطول نهر في العالم؟", a: ["نهر النيل", "الأمازون", "الكنغو", "المسيسيبي"], c: 0, x: "نهر النيل يمتد في قارة أفريقيا بطول 6650 كم تقريباً."},
                {t: "أي كوكب يسمى الكوكب الأحمر؟", a: ["المشتري", "زحل", "المريخ", "عطارد"], c: 2, x: "المريخ يكتسب لونه الأحمر من أكسيد الحديد الموجود بكثرة على سطحه."}
            ];
        }
        questions = questions.sort(() => 0.5 - Math.random()).slice(0, 10);
        qIdx = 0;
        showQuestion();
    };

    function showQuestion() {
        const q = questions[qIdx];
        const prog = ((qIdx + 1) / questions.length) * 100;
        document.getElementById('q-counter').innerText = `السؤال ${qIdx+1} / ${questions.length}`;
        document.getElementById('q-percent').innerText = `${Math.round(prog)}%`;
        document.getElementById('q-progress').style.width = prog + "%";
        document.getElementById('q-text').innerText = q.t;
        document.getElementById('analysis-container').classList.remove('show');
        document.getElementById('quiz-helpers').style.opacity = '1';
        document.getElementById('quiz-helpers').style.pointerEvents = 'auto';

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(i, btn);
            box.appendChild(btn);
        });
    }

    function selectAnswer(i, btn) {
        const q = questions[qIdx];
        const btns = document.querySelectorAll('.btn-option');
        btns.forEach(b => b.disabled = true);

        if(i === q.c) {
            btn.classList.add('correct');
            document.getElementById('snd-correct').play();
            window.gameData.coins += 20;
            window.gameData.xp += 100;
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
        } else {
            btn.classList.add('wrong');
            btns[q.c].classList.add('correct');
            document.getElementById('snd-wrong').play();
        }

        document.getElementById('analysis-text').innerText = q.x || "معلومة رائعة تم اكتسابها اليوم!";
        document.getElementById('analysis-container').classList.add('show');
        document.getElementById('quiz-helpers').style.opacity = '0.3';
        document.getElementById('quiz-helpers').style.pointerEvents = 'none';
        
        checkLevel();
        window.saveData();
    }

    window.nextQuestion = () => {
        qIdx++;
        if(qIdx < questions.length) showQuestion();
        else {
            window.gameData.stats.gamesPlayed++;
            window.gameData.stats.completedSections++;
            window.navTo('home');
            window.saveData();
        }
    };

    function checkLevel() {
        const nextXp = window.gameData.level * 1000;
        if(window.gameData.xp >= nextXp) {
            window.gameData.level++;
            window.gameData.coins += 500;
            window.gameData.notifications.push({text: `رائع! ترقيت للمستوى ${window.gameData.level}`, time: "الآن"});
        }
    }

    window.updateUI = () => {
        const d = window.gameData;
        document.getElementById('coin-count').innerText = d.coins;
        document.getElementById('top-lvl').innerText = d.level;
        document.getElementById('side-coins').innerText = d.coins;
        document.getElementById('side-lvl').innerText = d.level;
        document.getElementById('side-name').innerText = d.username;
        document.getElementById('side-comp').innerText = d.stats.completedSections;
        document.getElementById('side-total').innerText = d.stats.gamesPlayed;
        document.getElementById('h-del').innerText = d.inventory.delete;
        document.getElementById('h-hint').innerText = d.inventory.hint;
        document.getElementById('h-skip').innerText = d.inventory.skip;
        document.getElementById('username-input').value = d.username;
        
        const nextXp = d.level * 1000;
        document.getElementById('side-xp-text').innerText = `${d.xp} / ${nextXp}`;
        document.getElementById('side-xp-fill').style.width = Math.min((d.xp/nextXp)*100, 100) + "%";
        
        const nBox = document.getElementById('side-notifs');
        nBox.innerHTML = '';
        d.notifications.slice(-3).reverse().forEach(n => {
            nBox.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl text-[10px] border border-white/5"><p class="text-white mb-1 font-bold">${n.text}</p><span class="opacity-30">${n.time}</span></div>`;
        });

        document.getElementById('main-body').className = d.theme === 'light' ? 'light-mode' : '';
    };

    window.changeUsername = () => {
        const val = document.getElementById('username-input').value.trim();
        if(val.length < 3) return alert("الاسم قصير جداً!");
        window.gameData.username = val;
        window.saveData();
        window.updateUI();
        alert("تم حفظ الاسم الجديد!");
    };

    window.setTheme = (m) => {
        window.gameData.theme = m;
        window.saveData();
        window.updateUI();
    };

    async function renderLeaderboard() {
        const list = document.getElementById('leader-list');
        list.innerHTML = '<div class="text-center opacity-30 py-10">جاري جلب العباقرة...</div>';
        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'rankings'), orderBy('xp', 'desc'), limit(10));
        const snap = await getDocs(q);
        list.innerHTML = '';
        let i = 1;
        snap.forEach(d => {
            const u = d.data();
            list.innerHTML += `<div class="bg-[var(--card)] p-5 rounded-3xl flex justify-between items-center border border-white/5"><div class="flex items-center gap-4"><span class="w-10 h-10 flex items-center justify-center bg-amber-500 text-black rounded-xl font-black">${i++}</span><span class="font-black">${u.username}</span></div><span class="text-amber-500 font-black">${u.xp} XP</span></div>`;
        });
    }

    function renderShop() {
        const list = document.getElementById('shop-items');
        const items = [{id:'delete', n:'حذف خيارين', p:400, i: '✂️'}, {id:'hint', n:'تلميح ذكي', p:200, i: '💡'}, {id:'skip', n:'تخطي السؤال', p:600, i: '⏩'}];
        list.innerHTML = '';
        items.forEach(it => {
            list.innerHTML += `<div class="bg-[var(--card)] p-6 rounded-[35px] flex justify-between items-center border border-white/5"><div class="flex items-center gap-5"><span class="text-4xl">${it.i}</span><span class="font-black">${it.n}</span></div><button onclick="window.buy('${it.id}', ${it.p})" class="bg-amber-500 text-black px-8 py-3 rounded-2xl font-black shadow-lg active:scale-90 transition">${it.p} 💰</button></div>`;
        });
    }

    window.buy = (id, p) => {
        if(window.gameData.coins >= p) {
            window.gameData.coins -= p;
            window.gameData.inventory[id]++;
            window.saveData(); renderShop();
        } else alert("الذهب غير كافٍ!");
    };

    window.useHelper = (type) => {
        if(window.gameData.inventory[type] <= 0) return alert("الرصيد نفد! اشتري المزيد من المتجر.");
        const q = questions[qIdx];
        const btns = document.querySelectorAll('.btn-option');
        if(type === 'delete') {
            let count = 0; btns.forEach((b,i) => { if(i!==q.c && count<2) { b.style.opacity='0.1'; b.disabled=true; count++; }});
        } else if(type === 'hint') {
            alert("تلميح: " + (q.x || "فكر جيداً في الخيارات"));
        } else if(type === 'skip') {
            window.nextQuestion(); return;
        }
        window.gameData.inventory[type]--;
        window.updateUI(); window.saveData();
    };

    window.confirmExit = () => { if(confirm("هل أنت متأكد من الانسحاب؟")) window.navTo('paths'); };
    window.resetGame = () => { if(confirm("سيتم مسح كافة البيانات والذهب! هل أنت متأكد؟")) { window.gameData = {coins: 500, xp: 0, level: 1, username: "العبقري المجهول", inventory: { delete: 5, skip: 5, hint: 5 }, stats: { gamesPlayed: 0, completedSections: 0 }, rank: "باحث عن المعرفة", theme: 'dark', notifications: []}; window.saveData(); location.reload(); } };
</script>
</body>
</html>
