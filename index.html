<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعرف اللاعب - لعبة التخمين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- شاشة البداية -->
        <div id="start-screen" class="screen">
            <div class="header-bar">
                <button class="icon-btn" id="settings-btn">⚙️</button>
                <div class="stats-group">
                    <div class="stat-item">
                        <span class="icon">🏆</span>
                        <span id="highscore-display">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="icon">💰</span>
                        <span id="cash-display">100</span>
                    </div>
                </div>
                <button class="icon-btn" id="leaderboard-btn">📊</button>
            </div>
            
            <div class="logo-container">
                <img src="https://i.postimg.cc/bJs4zzxS/1000060703.png" alt="شعار اللعبة" class="game-logo">
            </div>
            
            <div class="player-level-container">
                <div class="level-badge" id="level-badge">مبتدئ</div>
                <div class="xp-bar">
                    <div class="xp-bar-fill" id="xp-bar-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- اختيار الصعوبة -->
            <div class="difficulty-selector">
                <h4>مستوى الصعوبة:</h4>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn active" data-difficulty="easy">سهل</button>
                    <button class="difficulty-btn" data-difficulty="medium">متوسط</button>
                    <button class="difficulty-btn" data-difficulty="hard">صعب</button>
                    <button class="difficulty-btn" data-difficulty="expert">خبير</button>
                </div>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" id="normal-mode-btn">🎮 عادي</button>
                <button class="mode-btn" id="challenge-mode-btn">⚡ تحدي</button>
            </div>

            <div class="xp-progress-container">
                <div class="xp-progress">
                    <div id="xp-progress-bar" class="xp-progress-fill" style="width: 0%"></div>
                </div>
                <span id="xp-progress-text">0/500 XP</span>
            </div>
            
            <button class="play-btn" id="play-btn">ابدأ اللعب</button>
        </div>

        <!-- شاشة اللعب -->
        <div id="game-container" class="screen hidden">
            <div class="game-header">
                <button class="icon-btn-game" id="back-to-menu-btn-game">☰</button>
                <div class="game-stats">
                    <div class="stat-item-game">
                        <span class="icon">🏆</span>
                        <span id="score-display">0</span>
                    </div>
                    <div class="stat-item-game">
                        <span class="icon">💰</span>
                        <span id="game-cash-display">100</span>
                    </div>
                    <div class="stat-item-game">
                        <span class="icon">⚡</span>
                        <span id="potential-points-display">30</span>
                    </div>
                </div>
            </div>

            <div class="timer-bar-container">
                <div id="timer-bar" class="timer-bar" style="width: 100%"></div>
            </div>

            <div id="challenge-timer-container" class="challenge-timer hidden">
                <span class="icon">⏰</span>
                <span id="challenge-timer">60</span> ث
            </div>

            <div class="level-info">
                <span id="player-level-text">مبتدئ</span>
                <span class="streak-badge" id="streak-display">🔥 0</span>
            </div>

            <div class="info-box" id="info-box"></div>

            <div class="choices" id="choices"></div>

            <div class="powerups-container">
                <div class="powerup-wrapper">
                    <button class="powerup-btn" id="powerup-5050" title="احذف خيارين خاطئين">50/50</button>
                    <span class="powerup-cost" id="powerup-5050-cost">15</span>
                </div>
                <div class="powerup-wrapper">
                    <button class="powerup-btn" id="powerup-nation" title="اعرف جنسية اللاعب">🌍</button>
                    <span class="powerup-cost" id="powerup-nation-cost">20</span>
                </div>
                <div class="powerup-wrapper">
                    <button class="powerup-btn" id="powerup-club" title="اعرف نادي اللاعب">👕</button>
                    <span class="powerup-cost" id="powerup-club-cost">25</span>
                </div>
                <div class="powerup-wrapper">
                    <button class="powerup-btn" id="powerup-hint" title="اعرف أول حرف من الاسم">A..?</button>
                    <span class="powerup-cost" id="powerup-hint-cost">30</span>
                </div>
                <div class="powerup-wrapper">
                    <button class="powerup-btn" id="powerup-swap" title="بدل اللاعب الحالي">🔄</button>
                    <span class="powerup-cost" id="powerup-swap-cost">35</span>
                </div>
            </div>
        </div>

        <!-- شاشة النهاية -->
        <div id="end-screen" class="screen hidden">
            <h2 id="end-title">انتهت اللعبة!</h2>
            
            <div class="end-stats-grid">
                <div class="stat-card">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-label">النتيجة</span>
                    <span class="stat-value" id="final-score-display">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">💰</span>
                    <span class="stat-label">الكاش</span>
                    <span class="stat-value" id="final-cash-display">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🔥</span>
                    <span class="stat-label">السلسلة</span>
                    <span class="stat-value" id="final-streak-display">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🏆</span>
                    <span class="stat-label">أفضل سلسلة</span>
                    <span class="stat-value" id="final-best-streak-display">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">⭐</span>
                    <span class="stat-label">الخبرة</span>
                    <span class="stat-value" id="final-xp-display">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">📊</span>
                    <span class="stat-label">المستوى</span>
                    <span class="stat-value" id="final-level-display">مبتدئ</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">⚡</span>
                    <span class="stat-label">Power-ups</span>
                    <span class="stat-value" id="final-powerups-used-count">0</span>
                </div>
            </div>

            <div class="achievement-unlock hidden" id="achievement-unlock">
                <span class="icon">🏆</span>
                <span>إنجاز جديد: </span>
                <span id="achievement-name"></span>
            </div>

            <div class="end-buttons">
                <button class="play-btn" id="restart-btn">🔄 العب مجددًا</button>
                <button class="secondary-btn" id="share-btn">📤 شارك</button>
                <button class="secondary-btn" id="back-to-menu-btn-end">🏠 القائمة</button>
            </div>
        </div>

        <!-- Overlay النتائج -->
        <div id="result-overlay" class="result-overlay hidden">
            <h2 id="result-text"></h2>
        </div>
        
        <!-- مودال الإعدادات -->
        <div class="modal-overlay hidden" id="settings-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>⚙️ الإعدادات</h3>
                    <button class="close-btn" id="close-settings-btn">✕</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <span>🔊 الصوت</span>
                        <label class="switch">
                            <input type="checkbox" id="sound-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <span>📳 الاهتزاز</span>
                        <label class="switch">
                            <input type="checkbox" id="vibration-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="secondary-btn" id="reset-game-data">🔄 إعادة تعيين</button>
                </div>
            </div>
        </div>

        <!-- مودال لوحة المتصدرين -->
        <div class="modal-overlay hidden" id="leaderboard-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📊 لوحة المتصدرين</h3>
                    <button class="close-btn" id="close-leaderboard-btn">✕</button>
                </div>
                <div class="modal-body">
                    <ul class="leaderboard-list" id="leaderboard-list"></ul>
                </div>
            </div>
        </div>

        <!-- مؤشر التحميل -->
        <div id="loading-spinner" class="loading-spinner hidden">
            <div class="spinner-content">
                <div class="spinner-icon"></div>
                <p>جاري تحميل اللاعبين...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
