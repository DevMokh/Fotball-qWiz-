
<div class="game-wrapper">
    <!-- Start Screen -->
    <div class="start-screen" id="start-screen">
        <h1>اعرف اللاعب</h1>
        <p>أعلى نتيجة: <span id="high-score-display">0</span></p>
        <button class="action-btn" id="start-btn">ابدأ اللعب</button>
    </div>

    <!-- Game Screen -->
    <div class="game-container hidden" id="game-container">
        <!-- Level & Progress -->
        <div class="player-level" id="player-level">مبتدئ</div>
        <div class="progress-bar-container"><div class="progress-bar" id="progress-bar"></div></div>
        
        <!-- Timer -->
        <div class="timer-container"><div class="timer-bar" id="timer-bar"></div></div>

        <!-- Header -->
        <div class="header">
            <span id="score">النقاط: 0</span>
            <span class="coins-display" id="coins-display">💰 100</span>
            <span id="potential-points">النقاط: 30</span>
        </div>

        <!-- Powerups -->
        <div class="powerups-container">
            <button class="powerup-btn" id="powerup-5050" title="حذف إجابة (15 عملة)">50/50</button>
            <button class="powerup-btn" id="powerup-nation" title="كشف الجنسية (20 عملة)">🌍</button>
            <button class="powerup-btn" id="powerup-club" title="كشف النادي (25 عملة)">👕</button>
            <button class="powerup-btn" id="powerup-hint" title="تلميح الحرف (30 عملة)">A..?</button>
        </div>

        <div class="info-box" id="info-box"></div>
        <button id="next-info-btn">معلومة إضافية</button>
        <div class="choices" id="choices"></div>
    </div>

    <!-- End Screen -->
    <div class="end-screen hidden" id="end-screen">
        <h1>انتهت اللعبة!</h1>
        <div class="final-score-container">
            <p>نتيجتك النهائية:</p>
            <div class="final-score" id="final-score">0</div>
            <p>أعلى نتيجة: <span id="high-score-end-display">0</span></p>
        </div>
        <button class="action-btn" id="restart-btn">العب مرة أخرى</button>
    </div>
</div>

<div class="result-overlay" id="result-overlay"><div class="result-text" id="result-text"></div></div>
